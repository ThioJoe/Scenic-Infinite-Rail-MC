name: Build packs

# Builds both release packs from the split src/ tree on every push or PR that
# changes src/ (see the paths filter below):
#   - ScenicInfiniteRailMode-Java     -> the Scenic_Infinite_Rail_Mode/ datapack folder (drag into the world's datapacks screen / folder)
#   - ScenicInfiniteRailMode-Bedrock  -> the .mcpack file (double-click to import)

on:
  push:
    branches: ['**']
    # Only build when the pack SOURCE (or the build script that assembles it)
    # changes. A doc / license / other-tooling-only commit produces a
    # byte-identical pack, so there's nothing new to build -- nor, since the
    # Integration tests workflow chains off this build, to test. (The version
    # source of truth lives at src/bedrock/bp/manifest.json, so version bumps
    # are covered.) Use workflow_dispatch to force a build without such a change.
    paths:
      - 'src/**'
      - 'tools/build.mjs'
  pull_request:
    paths:
      - 'src/**'
      - 'tools/build.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 pulls the full history + all tags so the release-bump
      # check below can find the highest existing release tag.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # BLOCKING gate. Every product-version reference in the two Bedrock
      # manifests (module versions, the BP->RP dependency, the RP header) must
      # match the source of truth -- header.version in src/bedrock/bp/manifest
      # .json. A mismatch fails the job with an ::error:: annotation naming the
      # offending reference, and the upload steps below are skipped (they gate
      # on this step's success), so an inconsistent build never ships.
      - name: Check version consistency
        id: vcheck
        run: node tools/check-version.mjs --consistency

      # Expose the manifest version (the source of truth) so the artifact names
      # can carry it. Runs after the consistency gate, so the value is known to
      # match every reference.
      - name: Resolve pack version
        id: ver
        run: echo "version=$(node tools/check-version.mjs --print)" >> "$GITHUB_OUTPUT"

      # Lints the shared dual-dialect functions, assembles both packs from
      # src/shared + src/java + src/bedrock, validates every function
      # reference resolves, and writes the .zip / .mcpack files.
      #
      # The logic simulation (tests/simulate.mjs) and the full headless-server
      # integration suites are NOT run here -- they live in the separate
      # "Integration tests" workflow (.github/workflows/test.yml), which triggers
      # off this build, downloads the very artifacts uploaded below, and tests
      # them. Keeping the slow tests out of this per-commit build is deliberate.
      - name: Build both packs
        run: node tools/build.mjs

      # NON-BLOCKING gate (for artifacts). Fails the job with an ::error::
      # annotation if the manifest version is not strictly greater than the
      # highest existing release tag ("1.4.6" / "v1.4.6"), so an un-bumped
      # version can't ship unnoticed -- but the uploads below still run
      # (they gate only on the consistency check), leaving a downloadable
      # build to test. No tags yet -> first release, passes.
      - name: Check release version bump
        id: relcheck
        run: node tools/check-version.mjs --release

      # Artifact names are <name>_<version>-<run_number>, e.g.
      # ScenicInfiniteRailMode-Bedrock_1.5.0-234: the manifest version sits
      # between the pack name and the run number, so a release attachment
      # (named <name>_<version>) is produced by simply chopping the
      # -<run_number> off the downloaded artifact. The run number still makes
      # successive test builds easy to tell apart (it increments on failed
      # runs too). The upload steps below run whenever the version-consistency
      # gate passed and the job wasn't cancelled, so an un-bumped-version
      # failure still leaves a downloadable build for testing -- the job still
      # reports failure overall, but the artifacts aren't withheld. A
      # consistency failure is the one case that DOES withhold them
      # (steps.vcheck.outcome must be 'success').

      # Downloading this artifact yields a zip with pack.mcmeta and the rest
      # of the datapack contents at the zip ROOT (not nested inside a
      # Scenic_Infinite_Rail_Mode/ folder), ready to drop into a world's
      # datapacks folder as-is.
      - name: Upload Java datapack (folder)
        if: ${{ !cancelled() && steps.vcheck.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ScenicInfiniteRailMode-Java_${{ steps.ver.outputs.version }}-${{ github.run_number }}
          path: dist/java/Scenic_Infinite_Rail_Mode/
          if-no-files-found: error

      # Downloading this artifact yields a zip containing the .mcaddon file
      # (BP + RP); extract once and double-click the .mcaddon to import.
      - name: Upload Bedrock pack (.mcaddon)
        if: ${{ !cancelled() && steps.vcheck.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ScenicInfiniteRailMode-Bedrock_${{ steps.ver.outputs.version }}-${{ github.run_number }}
          path: dist/*.mcaddon
          if-no-files-found: error

      # The unzipped Bedrock packs, for development testing: extract and drop
      # Scenic_Infinite_Rail_Mode_BP / Scenic_Infinite_Rail_Mode_RP into
      # com.mojang's development_behavior_packs / development_resource_packs.
      - name: Upload Bedrock packs (folders, for development)
        if: ${{ !cancelled() && steps.vcheck.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ScenicInfiniteRailMode-Bedrock-Folder_${{ steps.ver.outputs.version }}-${{ github.run_number }}
          path: dist/bedrock/
          if-no-files-found: error
